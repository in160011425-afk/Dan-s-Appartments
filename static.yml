name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secrets
        run: |
          sed -i 's|window.SUPABASE_URL = "__SUPABASE_URL__";|window.SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";|g' index.html
          sed -i 's|window.SUPABASE_ANON_KEY = "__SUPABASE_ANON_KEY__";|window.SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}";|g' index.html
          sed -i 's|window.SUPABASE_URL = "__SUPABASE_URL__";|window.SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";|g' tenant.html
          sed -i 's|window.SUPABASE_ANON_KEY = "__SUPABASE_ANON_KEY__";|window.SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}";|g' tenant.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
