name: Inject Secrets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  inject-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Inject Supabase secrets into HTML
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Escape special characters for sed
          URL_ESCAPED=$(printf '%s\n' "$SUPABASE_URL" | sed -e 's/[\/&]/\\&/g')
          KEY_ESCAPED=$(printf '%s\n' "$SUPABASE_ANON_KEY" | sed -e 's/[\/&]/\\&/g')
          
          # Find and replace placeholders in index.html
          sed -i "s/__SUPABASE_URL__/$URL_ESCAPED/g" index.html
          sed -i "s/__SUPABASE_ANON_KEY__/$KEY_ESCAPED/g" index.html
          
          # Also update tenant.html if it exists
          if [ -f tenant.html ]; then
            sed -i "s/__SUPABASE_URL__/$URL_ESCAPED/g" tenant.html
            sed -i "s/__SUPABASE_ANON_KEY__/$KEY_ESCAPED/g" tenant.html
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add index.html tenant.html 2>/dev/null || git add index.html
          git diff --cached --quiet || (git commit -m "🔒 Inject Supabase secrets" && git push)
